<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/smallLogo.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/smallLogo.ico" />

    <!-- Viewport for responsive design -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Primary Meta Tags -->
    <title>Skytrigon | Portfolio</title>
    <meta
      name="description"
      content="Explore the professional portfolio of Skytrigon, showcasing innovative projects and expertise in web development."
    />
    <meta
      name="keywords"
      content="Skytrigon, portfolio, web development, projects, software engineering, design"
    />
    <meta name="author" content="Skytrigon" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://skytrigon.com/" />
    <meta
      property="og:title"
      content="Skytrigon | Experience the Better"
    />
    <meta
      property="og:description"
      content="Showcasing a diverse collection of web development projects, skills, and professional experience."
    />
    <meta
      property="og:image"
      content="https://skytrigon.com/assets/og-image.jpg"
    />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:url" content="https://skytrigon.com/" />
    <meta
      name="twitter:title"
      content="Skytrigon | Experience the Better"
    />
    <meta
      name="twitter:description"
      content="Discover the innovative projects and expertise of Skytrigon in web development and design."
    />
    <meta
      name="twitter:image"
      content="https://skytrigon.com/assets/og-image.jpg"
    />

    <!-- Theme Color for Mobile Browsers -->
    <meta name="theme-color" content="#000000" />

    <!-- Google AdSense -->
    <meta name="google-adsense-account" content="ca-pub-6542623777003381" />

    <!-- Canonical URL to prevent duplicate content -->
    <link rel="canonical" href="https://skytrigon.com/" />

    <!-- Manifest for PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Additional SEO for Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Skytrigon",
        "url": "https://skytrigon.com/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://skytrigon.com/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
